description = "Run tests (optionally scoped to a package or path via {{args}}) and triage failures. Use when user says 'run the tests' / 'check if tests pass' / 'test this' / 'verify' / 'are tests green', or wants test results triaged after a change."

prompt = """
Run the project's test suite. If `{{args}}` is provided, scope the test run to that package, path, or test name.

## Detect the test runner

Look at the project's package manifests:

```
!{ls -1 package.json pyproject.toml Cargo.toml go.mod 2>/dev/null || true}
```

Based on what's found, run:

- Node (pnpm): `pnpm test {{args}}`
- Node (npm):  `npm test -- {{args}}`
- Python (uv): `uv run pytest {{args}} -x --tb=short`
- Python (poetry): `poetry run pytest {{args}} -x --tb=short`
- Rust: `cargo test {{args}}`
- Go: `go test ./... {{args}}`

## Run

```
!{pnpm test {{args}} 2>&1 | tail -80 || true}
```

(If the above command isn't right for this project, switch to the correct one and re-run.)

## Triage

- If **all tests pass**: report counts (passed / skipped / time) and stop.
- If tests **fail**:
  - Root-cause the **first failure only** (don't try to debug all of them in parallel).
  - Identify the file:line that broke.
  - Propose the minimal fix as a diff.
  - Stop before applying — wait for user confirmation.

## Never

- Mark a test `.skip` / `xfail` to make CI green. That's debt; raise the issue with the user.
- Loosen an assertion to make it pass. The assertion is the contract.
- Run tests with environment changes (`NODE_ENV=test foo`) that aren't already in the project's `package.json`/Makefile/justfile.
"""
