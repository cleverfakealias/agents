# Project-scoped Codex config. Committed. Pins model, sandbox, profiles, MCP for the team.
# Never put secret VALUES here — use env var NAMES via the *_env / *_env_var fields.
#
# Personal overrides belong in ~/.codex/config.toml (NOT committed); project config inherits.

model = "gpt-5.5"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 32000
project_doc_fallback_filenames = ["AGENTS.md"]

# ---------------------------------------------------------------------------
# Profiles — activate with `codex --profile <name>`
# ---------------------------------------------------------------------------

[profiles.review]
# Read-only review pass with high reasoning. Safe to run against any branch.
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
approval_policy = "untrusted"

[profiles.plan]
# High reasoning, read-only — produces an implementation plan without touching files.
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
sandbox_mode = "read-only"
approval_policy = "on-request"

[profiles.yolo]
# Container / VM ONLY. Skips approvals and lets the sandbox loose.
# Do NOT activate on a laptop host.
sandbox_mode = "danger-full-access"
approval_policy = "never"

# ---------------------------------------------------------------------------
# MCP servers
# ---------------------------------------------------------------------------

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN_ENV = "GITHUB_TOKEN" }
enabled = true
required = false
startup_timeout_sec = 10
tool_timeout_sec = 60
